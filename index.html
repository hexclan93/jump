<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Game</title>
    <style>
        /* --- GENERAL STYLES --- */
        body {
            margin: 0; padding: 0;
            background-color: #e2e2e2;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; user-select: none;
        }
        h1 { margin-bottom: 10px; color: #333; }

        /* --- GAME AREA --- */
        #game-container {
            padding: 10px; background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        #game {
            width: 600px; height: 200px;
            border-bottom: 3px solid #333;
            position: relative; background-color: white;
            overflow: hidden; cursor: pointer;
        }

        /* Character */
        #character {
            width: 50px; height: 50px;
            position: absolute; top: 150px; left: 20px;
            z-index: 10;
        }
        #character img { width: 100%; height: 100%; object-fit: contain; }

        /* Obstacle */
        #block {
            width: 40px; height: 40px; /* Adjusted size for rock image */
            position: absolute; top: 160px; /* Adjusted top for rock image */
            left: 580px;
            display: none; z-index: 5;
        }
        #block img { width: 100%; height: 100%; object-fit: contain; }

        /* Animations */
        .animate-jump { animation: jump 500ms linear; }
        .animate-block { animation: blockMove 1.5s infinite linear; }

        @keyframes jump {
            0% { top: 150px; }
            40% { top: 70px; }
            60% { top: 70px; }
            100% { top: 150px; }
        }
        @keyframes blockMove {
            0% { left: 580px; }
            100% { left: -40px; }
        }

        /* Score & Msg */
        #scoreBoard {
            font-size: 20px; font-weight: bold;
            position: absolute; top: 10px; right: 20px; color: #555;
        }
        #gameOverMsg {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px; color: #d90429; font-weight: bold;
            display: none; text-align: center;
            background: rgba(255,255,255,0.95);
            padding: 20px; border: 3px solid #d90429;
            border-radius: 10px; z-index: 20;
        }
        
        .instructions { margin-top: 15px; color: #666; }

    </style>
</head>
<body>

    <h1>Super Runner</h1>

    <div id="game-container">
        <div id="game">
            <div id="scoreBoard">Score: 0</div>
            <div id="gameOverMsg">GAME OVER<br><span style="font-size:16px; color:#333;">Click to Restart</span></div>
            
            <div id="character">
                <img id="charImg" src="boy.jpg" alt="boy">
            </div>

            <div id="block">
                <img id="obstacleImg" src="obstacle.jpg" alt="obstacle">
            </div>
        </div>
    </div>

    <p class="instructions">Press <strong>Space</strong> or <strong>Click</strong> to Jump</p>

    <script>
        // --- PASTE YOUR AUDIO LINKS BELOW ---
        // If you leave them as is, the game works but will be silent.
        
        const jumpSoundLink = "jump.mp3"; 
        const loseSoundLink = "lose.mp3";

        // --------------------------------------------------

        const character = document.getElementById("character");
        const block = document.getElementById("block");
        const scoreDisplay = document.getElementById("scoreBoard");
        const gameOverMsg = document.getElementById("gameOverMsg");

        let score = 0;
        let gameInterval;
        let isGameOver = true;

        let jumpAudio = new Audio();
        let loseAudio = new Audio();

        // Load audio if links are valid
        if (jumpSoundLink && !jumpSoundLink.includes("PASTE_")) {
            jumpAudio.src = jumpSoundLink;
        }
        if (loseSoundLink && !loseSoundLink.includes("PASTE_")) {
            loseAudio.src = loseSoundLink;
        }

        function jump() {
            if (character.classList.contains("animate-jump")) return;
            
            // Play jump sound
            if (jumpAudio.src) {
                jumpAudio.currentTime = 0;
                jumpAudio.play().catch(e => console.log("Audio not set"));
            }

            character.classList.add("animate-jump");
            setTimeout(() => character.classList.remove("animate-jump"), 500);
        }

        function startGame() {
            if (!isGameOver) return;

            isGameOver = false;
            gameOverMsg.style.display = "none";
            block.style.display = "block";
            
            block.classList.remove("animate-block");
            void block.offsetWidth; 
            block.classList.add("animate-block");
            
            score = 0;
            scoreDisplay.innerText = "Score: 0";

            gameInterval = setInterval(function() {
                let charTop = parseInt(window.getComputedStyle(character).getPropertyValue("top"));
                let blockLeft = parseInt(window.getComputedStyle(block).getPropertyValue("left"));

                // Collision Logic
                // Note: I adjusted the numbers slightly to fit the new images better
                if (blockLeft < 40 && blockLeft > 0 && charTop >= 130) {
                    gameOver();
                } else {
                    score++;
                    scoreDisplay.innerText = "Score: " + Math.floor(score / 10);
                }
            }, 10);
        }

        function gameOver() {
            // Play lose sound
            if (loseAudio.src) {
                loseAudio.currentTime = 0;
                loseAudio.play().catch(e => console.log("Audio not set"));
            }

            block.style.display = "none";
            block.classList.remove("animate-block");
            clearInterval(gameInterval);
            isGameOver = true;
            gameOverMsg.style.display = "block";
        }

        document.body.onkeyup = function(e) {
            if (e.code === "Space") {
                if(isGameOver) startGame(); else jump();
            }
        }
        
        document.getElementById("game").addEventListener('click', function() {
            if(isGameOver) startGame(); else jump();
        });

    </script>
</body>
</html>
